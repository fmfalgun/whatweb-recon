<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain Detail — whatweb-recon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">WHATWEB-RECON</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="tech-board.html">Tech Board</a>
    <a href="https://github.com/fmfalgun/whatweb-recon" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
    <a href="https://fmfalgun.github.io" target="_blank" rel="noopener noreferrer">Portfolio ↗</a>
  </div>
</nav>

<div class="domain-header">
  <span class="domain-name-display" id="domain-name-display">—</span>
  <span class="domain-contributor" id="contributor-meta"></span>
</div>

<section id="stats-row" class="stats-row">
  <div class="stat-badge">
    <span class="stat-value" id="val-url-count">—</span>
    <span class="stat-label">URLs Scanned</span>
  </div>
  <div class="stat-badge">
    <span class="stat-value" id="val-server">—</span>
    <span class="stat-label">Server</span>
  </div>
  <div class="stat-badge">
    <span class="stat-value" id="val-cms">—</span>
    <span class="stat-label">CMS</span>
  </div>
  <div class="stat-badge">
    <span class="stat-value" id="val-php">—</span>
    <span class="stat-label">PHP</span>
  </div>
</section>

<main>

  <p id="queried-at-line">data as of <span id="queried-at">—</span></p>

  <div class="section" id="section-flags">
    <h2 class="section-title">Security Flags</h2>
    <div id="flags-grid" class="email-security-grid"></div>
  </div>

  <div class="section" id="section-results">
    <h2 class="section-title">URL Results</h2>
    <div id="results-grid" class="records-grid"></div>
  </div>

  <div class="section" id="section-plugins">
    <h2 class="section-title">Interesting Plugins</h2>
    <div id="plugins-list" class="card-stats"></div>
  </div>

  <div id="error-box" style="display:none"><span id="error-message"></span></div>

</main>

<footer class="site-footer">
  <a href="tech-board.html">← Tech Board</a>
  &nbsp;·&nbsp; whatweb-recon &nbsp;·&nbsp;
  <a href="https://github.com/fmfalgun/whatweb-recon" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
</footer>

<script src="assets/js/domain.js"></script>
</body>
</html>
